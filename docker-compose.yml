name: web-mcp-tools

services:
  mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WEB_MCP_TOOLS_HOST: 0.0.0.0
      WEB_MCP_TOOLS_PORT: "8000"
      WEB_MCP_TOOLS_STREAMABLE_HTTP_PATH: /mcp
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)\"",
        ]
