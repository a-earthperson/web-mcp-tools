name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Build package
        run: |
          uv build --no-sources

      - name: Validate wheel contents
        run: |
          uv run python - <<'PY'
          import glob
          import zipfile

          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              raise SystemExit("No wheels found in dist/.")

          wheel = wheels[-1]
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())

          package_files = [n for n in names if n.startswith("web_mcp_tools/")]
          if not package_files:
              raise SystemExit("Wheel is missing web_mcp_tools package files.")

          required_files = {
              "web_mcp_tools/__init__.py",
              "web_mcp_tools/__main__.py",
          }
          missing_required = sorted(required_files - names)
          if missing_required:
              raise SystemExit(
                  f"Wheel is missing required package files: {missing_required}"
              )

          if not any(n.endswith(".dist-info/entry_points.txt") for n in names):
              raise SystemExit("Wheel is missing console script entry points metadata.")

          print(f"Validated wheel: {wheel}")
          print(f"Package files: {len(package_files)}")
          PY

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  validate-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: |
          docker compose config

      - name: Build and start Compose service
        run: |
          docker compose up --build -d mcp

      - name: Wait for container healthcheck
        run: |
          cid="$(docker compose ps -q mcp)"
          if [ -z "$cid" ]; then
            echo "Could not determine container id for mcp service"
            docker compose ps
            exit 1
          fi

          for i in $(seq 1 30); do
            status="$(docker inspect -f '{{.State.Health.Status}}' "$cid" 2>/dev/null || true)"
            if [ "$status" = "healthy" ]; then
              echo "Container is healthy"
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              echo "Container is unhealthy"
              docker compose logs mcp
              exit 1
            fi
            sleep 1
          done

          echo "Container did not become healthy in time"
          docker compose logs mcp
          exit 1

      - name: Stop Docker Compose
        if: always()
        run: |
          docker compose down --volumes --remove-orphans || true

  publish-pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-package

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        run: |
          uv publish dist/*

  publish-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-pypi, publish-docker]
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
